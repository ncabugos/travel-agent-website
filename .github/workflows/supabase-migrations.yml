name: Supabase migrations

# Applies any new SQL files in supabase/migrations/ to the production
# Supabase project whenever they land on main. Keeps the DB in lockstep
# with deploys so migrations can't silently drift again.
#
# One-time setup — add these repo secrets (Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN   personal access token (supabase.com/dashboard/account/tokens)
#   SUPABASE_DB_PASSWORD    the project's database password
#   SUPABASE_PROJECT_REF    the project ref (subdomain in your SUPABASE_URL)
#
# IMPORTANT: this only works AFTER the existing migrations have been
# baselined with `supabase migration repair` (see supabase/MIGRATIONS.md),
# otherwise `db push` will try to re-run 001+ against a populated DB and fail.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch: {}

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
